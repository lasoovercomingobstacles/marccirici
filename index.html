<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Evita que el navegador fuerce modo oscuro -->
  <meta name="color-scheme" content="light only">
  <meta name="supported-color-schemes" content="light">
  <meta name="theme-color" content="#0d47c7">

  <title>Juan Miguel Ayestaran - LASO</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      color-scheme: light;
      background: #eef2f6;
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #eef2f6, #dfe5eb);
      color: #1f2933;
    }

    .hero img {
      width: 100%;
      height: auto;
      display: block;
      aspect-ratio: 16 / 5;
      object-fit: cover;
    }

    .contenedor {
      width: 100%;
      max-width: 720px;
      margin: -38px auto 0;
      padding: 0 16px 36px;
      position: relative;
    }

    .tarjeta {
      background: #ffffff;
      border-radius: 26px;
      box-shadow:
        0 8px 20px rgba(0,0,0,0.06),
        0 22px 50px rgba(0,0,0,0.10);
      padding: 28px 22px 26px;
      border: 1px solid rgba(255,255,255,0.8);
    }

    .logo-circulo {
      width: 92px;
      height: 92px;
      background: #ffffff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: -70px auto 18px;
      box-shadow: 0 10px 26px rgba(0,0,0,0.14);
      border: 4px solid #ffffff;
      overflow: hidden;
    }

    .logo-circulo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 22%;
      transform: scale(1.15);
      display: block;
    }

    h1 {
      margin: 0 0 20px;
      text-align: center;
      font-size: 2rem;
      line-height: 1.15;
      letter-spacing: 0.02em;
      color: #111827;
    }

    .nombre {
      font-size: 1.45rem;
      font-weight: 700;
      margin: 0 0 6px;
      color: #111827;
    }

    .cargo {
      color: #6b7280;
      margin: 0 0 24px;
      font-size: 0.98rem;
    }

    .titulo-seccion {
      font-size: 1.05rem;
      font-weight: 700;
      margin: 26px 0 14px;
      padding-top: 22px;
      border-top: 1px solid #e5e7eb;
      color: #111827;
    }

    .lista {
      display: grid;
      gap: 13px;
    }

    .item {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding: 16px 18px;
      border-radius: 18px;
      background: #ffffff;
      border: 1px solid #e6e9ee;
      text-decoration: none;
      color: inherit;
      word-break: break-word;
      transition: 0.2s ease;
    }

    .item:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(0,0,0,0.08);
      border-color: #d6dbe2;
    }

    .icono {
      width: 36px;
      height: 36px;
      flex: 0 0 36px;
      border-radius: 12px;
      background: #f1f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #374151;
    }

    .icono svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
    }

    .etiqueta {
      font-size: 0.82rem;
      color: #7b8794;
      margin-bottom: 4px;
    }

    .valor {
      font-size: 1.02rem;
      font-weight: 600;
      line-height: 1.35;
      color: #1f2937;
    }

    @media (prefers-color-scheme: dark) {
      html,
      body {
        background: linear-gradient(180deg, #eef2f6, #dfe5eb) !important;
        color: #1f2933 !important;
      }

      .tarjeta {
        background: #ffffff !important;
        color: #1f2933 !important;
        border-color: rgba(255,255,255,0.8) !important;
      }

      .item {
        background: #ffffff !important;
        border-color: #e6e9ee !important;
        color: #1f2933 !important;
      }

      .icono {
        background: #f1f4f8 !important;
        color: #374151 !important;
      }

      h1,
      .nombre,
      .titulo-seccion {
        color: #111827 !important;
      }

      .cargo {
        color: #6b7280 !important;
      }

      .etiqueta {
        color: #7b8794 !important;
      }

      .valor {
        color: #1f2937 !important;
      }

      .logo-circulo {
        background: #ffffff !important;
        border-color: #ffffff !important;
      }
    }

    @media (max-width: 600px) {
      .hero img {
        aspect-ratio: 16 / 8;
      }

      .contenedor {
        margin-top: -26px;
        padding: 0 12px 28px;
      }

      .tarjeta {
        border-radius: 22px;
        padding: 24px 16px 22px;
      }

      .logo-circulo {
        width: 82px;
        height: 82px;
        margin-top: -62px;
      }

      .logo-circulo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center 22%;
        transform: scale(1.15);
      }

      h1 {
        font-size: 1.7rem;
      }

      .nombre {
        font-size: 1.2rem;
      }

      .cargo,
      .valor {
        font-size: 0.98rem;
      }

      .item {
        padding: 15px;
      }
    }
  </style>
</head>

<body>

  <div class="hero">
    <img src="banner.png" alt="LASO">
  </div>

  <div class="contenedor">
    <div class="tarjeta">

          <div class="icono">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
              <path d="M21 10c0 7-9 12-9 12S3 17 3 10a9 9 0 1 1 18 0z"/>

    </div>
  </div>

</body>
</html>
